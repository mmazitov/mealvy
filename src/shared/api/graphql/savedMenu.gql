fragment SavedMenuFields on SavedMenu {
	id
	name
	startDate
	endDate
	weekNumber
	totalDishes
	totalCalories
	totalProtein
	totalFat
	totalCarbs
	isFavorite
	createdAt
	updatedAt
	ownerId
	ownerName
	ownerEmail
	items {
		id
		dishId
		date
		mealTime
		dish {
			id
			name
			imageUrl
			category
			calories
			protein
			fat
			carbs
		}
	}
}

query SavedMenus {
	savedMenus {
		...SavedMenuFields
	}
}

query SharedMenus {
	sharedMenus {
		...SavedMenuFields
	}
}

query SavedMenu($id: ID!) {
	savedMenu(id: $id) {
		...SavedMenuFields
	}
}

mutation DeleteSavedMenu($id: ID!) {
	deleteSavedMenu(id: $id) {
		id
		name
	}
}

mutation DuplicateSavedMenu($id: ID!) {
	duplicateSavedMenu(id: $id) {
		...SavedMenuFields
	}
}

mutation UpdateSavedMenu(
	$id: ID!
	$name: String!
	$startDate: String!
	$endDate: String!
) {
	updateSavedMenu(
		id: $id
		name: $name
		startDate: $startDate
		endDate: $endDate
	) {
		...SavedMenuFields
	}
}

mutation SaveMenuPlan(
	$name: String!
	$startDate: String!
	$endDate: String!
	$weekNumber: Int!
) {
	saveMenuPlan(
		name: $name
		startDate: $startDate
		endDate: $endDate
		weekNumber: $weekNumber
	) {
		...SavedMenuFields
	}
}

mutation AddToFavoritesMenu($menuId: ID!) {
	addToFavoritesMenu(menuId: $menuId) {
		id
		favoriteMenus {
			id
		}
	}
}

mutation RemoveFromFavoritesMenu($menuId: ID!) {
	removeFromFavoritesMenu(menuId: $menuId) {
		id
		favoriteMenus {
			id
		}
	}
}
